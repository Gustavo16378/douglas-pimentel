    <!--

      (with https + domain) for the preview card to render in WhatsApp/Instagram DMs.
      If the Pages URL ever changes, update every https://douglas-pimentel.pages.dev below.
    -->
    <link rel="canonical" href="https://douglas-pimentel.pages.dev/" />

    <title>Douglas Pimentel — Advogado Trabalhista | Palmas-TO</title>

      name="description"
      content="Advocacia trabalhista do lado do trabalhador. Demissão, horas extras, verbas rescisórias e mais — avaliação do seu caso pelo WhatsApp."
    />
    <meta name="author" content="Douglas Pimentel — OAB/TO 9376" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Douglas Pimentel Advocacia" />
    <meta property="og:title" content="Douglas Pimentel — Advogado Trabalhista" />
    <meta
      property="og:description"
      content="Seus direitos valem a briga. Advocacia trabalhista em Palmas-TO — sempre do lado do trabalhador."
    />
    <meta property="og:url" content="https://douglas-pimentel.pages.dev/" />
    <meta property="og:image" content="https://douglas-pimentel.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Douglas Pimentel — Advogado Trabalhista, Palmas-TO" />

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="Seus direitos valem a briga. Advocacia trabalhista em Palmas-TO — sempre do lado do trabalhador."

    <meta name="twitter:image" content="https://douglas-pimentel.pages.dev/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
